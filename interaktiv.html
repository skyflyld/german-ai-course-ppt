<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deutsch interaktiv: Meine Kindheit</title>
<style>
:root{--bg:#fdf6ec;--gold:#c7852a;--brown:#5c3d2e;--light-gold:#f5e6d3;--green:#4a7c59;--red:#c0392b;--card:#fff;--text:#3a2a1a;--muted:#8b7355}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
header{background:linear-gradient(135deg,#5c3d2e,#8b6914);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.progress{display:flex;gap:4px;align-items:center}
.progress-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.progress-dot.done{background:#8fd17f}
.progress-dot.active{background:#ffd166;box-shadow:0 0 8px rgba(255,209,102,.6);transform:scale(1.4)}
.score-badge{background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;font-size:13px}
.container{max-width:720px;margin:0 auto;padding:20px}
.slide{display:none;animation:fadeIn .4s ease}
.slide.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:12px;padding:24px;margin:16px 0;box-shadow:0 2px 8px rgba(92,61,46,.08);border:1px solid var(--light-gold)}
.card h2{color:var(--brown);font-size:20px;margin-bottom:12px;border-bottom:2px solid var(--light-gold);padding-bottom:8px}
.card h3{color:var(--brown);font-size:16px;margin:16px 0 8px}
.exercise{margin:16px 0}
input[type=text],textarea{width:100%;padding:10px 14px;border:2px solid var(--light-gold);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg);transition:.2s}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(199,133,42,.15)}
textarea{min-height:80px;resize:vertical}
.btn{display:inline-block;padding:10px 24px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn-primary{background:var(--gold);color:#fff}
.btn-primary:hover{background:#a06e22;transform:translateY(-1px)}
.btn-secondary{background:var(--light-gold);color:var(--brown)}
.btn-secondary:hover{background:#e8d5b8}
.btn-small{padding:6px 14px;font-size:13px}
.feedback{padding:10px 14px;border-radius:8px;margin:8px 0;font-size:14px;display:none}
.feedback.correct{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;display:block}
.feedback.wrong{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;display:block}
.grammar-hl{background:linear-gradient(180deg,transparent 60%,rgba(199,133,42,.25) 60%);padding:0 2px;border-radius:2px}
.perfekt-hl{background:linear-gradient(180deg,transparent 60%,rgba(74,124,89,.2) 60%);padding:0 2px;border-radius:2px;border-bottom:1.5px dashed var(--green)}
.vocab-card{display:inline-block;background:var(--light-gold);border-radius:8px;padding:8px 14px;margin:4px;font-size:14px;cursor:pointer;transition:.2s;border:1px solid transparent}
.vocab-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.vocab-card.revealed{background:var(--card);border-color:var(--green)}
.vocab-card .zh{display:none;color:var(--muted);font-size:12px;margin-top:4px}
.vocab-card.revealed .zh{display:block}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{padding:10px 14px;background:var(--bg);border:2px solid var(--light-gold);border-radius:8px;cursor:pointer;text-align:center;transition:.2s;font-size:14px}
.match-item:hover{background:var(--light-gold)}
.match-item.selected{background:var(--gold);color:#fff;border-color:var(--gold)}
.match-item.matched{background:var(--green);color:#fff;border-color:var(--green);cursor:default}
.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-item{padding:12px 16px;background:var(--bg);border:2px solid var(--light-gold);border-radius:8px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.radio-item:hover{background:var(--light-gold)}
.radio-item input[type=radio]{accent-color:var(--gold);width:18px;height:18px}
.radio-item.correct-choice{background:#e8f5e9;border-color:var(--green)}
.radio-item.wrong-choice{background:#ffebee;border-color:var(--red)}
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--green);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:.2s}
.speak-btn:hover{background:#3d6b4a}
.speak-btn:disabled{opacity:.5;cursor:not-allowed}
.score-display{text-align:center;padding:40px 20px}
.score-display .big{font-size:48px;color:var(--gold);font-weight:700}
.score-display .sub{color:var(--muted);margin-top:8px}
nav{display:flex;gap:8px;justify-content:center;margin-top:24px;padding-bottom:40px}
.step-indicator{font-size:13px;color:var(--muted);margin-bottom:8px}
@media(max-width:600px){header h1{font-size:15px}.card{padding:16px}.match-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>🇩🇪 Deutsch interaktiv · Meine Kindheit</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="progress" id="progressDots"></div>
    <div class="score-badge" id="scoreDisplay">⭐ 0/0</div>
  </div>
</header>

<div class="container" id="slidesContainer"></div>

<nav>
  <button class="btn btn-secondary" id="prevBtn" style="display:none">← Zurück</button>
  <button class="btn btn-primary" id="nextBtn">Weiter →</button>
</nav>

<script>
// ===== DATA =====
const slides = [
  // SLIDE 0: Vocabulary
  {
    title: "Wortschatz · 词汇",
    subtitle: "Klicke auf jede Karte, um die Bedeutung zu sehen.",
    type: "vocab",
    words: [
      {de:"die Kindheit", zh:"童年"},
      {de:"sich erinnern an", zh:"回忆起"},
      {de:"aufwachsen", zh:"长大"},
      {de:"der Spielplatz", zh:"游乐场"},
      {de:"der Kindergarten", zh:"幼儿园"},
      {de:"die Grundschule", zh:"小学"},
      {de:"der Freund / die Freundin", zh:"朋友"},
      {de:" draußen spielen", zh:"在外面玩"},
    ],
  },
  // SLIDE 1: Grammar - Präteritum
  {
    title: "Grammatik · Präteritum",
    subtitle: "Ergänze die richtige Präteritum-Form.",
    type: "fillblank",
    intro: 'Das <span class="grammar-hl">Präteritum</span> beschreibt die Vergangenheit. Bei "sein" und "haben" benutzen wir oft Präteritum.',
    questions: [
      {prompt:'Ich ___ als Kind sehr glücklich. (sein)', answer:'war', hint:'sein → war'},
      {prompt:'Wir ___ einen großen Garten. (haben)', answer:'hatten', hint:'haben → hatten'},
      {prompt:'Meine Eltern ___ immer sehr beschäftigt. (sein)', answer:'waren', hint:'sein → waren'},
      {prompt:'Ich ___ viele Freunde in der Schule. (haben)', answer:'hatte', hint:'haben → hatte'},
    ],
  },
  // SLIDE 2: Match exercise
  {
    title: "Zuordnung · 配对",
    subtitle: "Ordne die deutschen Sätze den chinesischen Übersetzungen zu.",
    type: "match",
    pairs: [
      {de:"Als ich klein war, spielte ich oft im Garten.", zh:"我小时候经常在花园里玩。"},
      {de:"Meine Mutter kochte jeden Tag für uns.", zh:"我妈妈每天给我们做饭。"},
      {de:"In der Schule hatte ich viele Freunde.", zh:"在学校里我有很多朋友。"},
      {de:"Wir wohnten in einem kleinen Dorf.", zh:"我们住在一个小村庄里。"},
    ],
  },
  // SLIDE 3: Reading comprehension
  {
    title: "Leseverstehen · 阅读理解",
    subtitle: "Lies den Text und beantworte die Fragen.",
    type: "reading",
    text: `<p>Hallo, ich heiße Thomas. Ich bin in einem kleinen Dorf in Bayern <span class="grammar-hl">aufgewachsen</span>. Als Kind <span class="grammar-hl">war</span> ich sehr aktiv — ich <span class="grammar-hl">spielte</span> jeden Tag draußen mit meinen Freunden. Wir <span class="grammar-hl">hatten</span> einen großen Garten mit vielen Blumen. Meine Großmutter <span class="grammar-hl">wohnte</span> bei uns. Sie <span class="grammar-hl">erzählte</span> mir immer Geschichten aus ihrer eigenen Kindheit. Das <span class="grammar-hl">war</span> meine schönste Zeit.</p>`,
    questions: [
      {q:"Wo ist Thomas aufgewachsen?", options:["In einer Großstadt","In einem kleinen Dorf in Bayern","In Berlin"], correct:1},
      {q:"Wie war Thomas als Kind?", options:["Sehr ruhig","Sehr aktiv","Sehr traurig"], correct:1},
      {q:"Wer wohnte bei Thomas?", options:["Sein Onkel","Seine Großmutter","Sein bester Freund"], correct:1},
    ],
  },
  // SLIDE 4: Writing
  {
    title: "Schreiben · 写作",
    subtitle: 'Schreibe 3-4 Sätze über deine eigene Kindheit. Benutze das <span class="grammar-hl">Präteritum</span>.',
    type: "writing",
    prompt: "Als ich ein Kind war...",
    tips: ["Benutze: war / hatte / spielte / wohnte / ging","Schreibe über: wo du gelebt hast, was du gern gemacht hast, wer deine Freunde waren"],
  },
];

// ===== STATE =====
let currentSlide = 0;
let totalCorrect = 0;
let totalAttempts = 0;
let slideAnswered = new Array(slides.length).fill(false);
let matchSelected = null;
let matchLeftMatched = new Set();
let matchRightMatched = new Set();

// ===== RENDER =====
function updateScore(){document.getElementById('scoreDisplay').textContent=`⭐ ${totalCorrect}/${totalAttempts}`}
function updateProgress(){
  const dots = document.getElementById('progressDots');
  dots.innerHTML = slides.map((_,i)=>{
    let cls='';
    if(i===currentSlide) cls='active';
    else if(slideAnswered[i]) cls='done';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');
}

function showSlide(n){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(`slide-${n}`);
  if(el) el.classList.add('active');
  currentSlide = n;
  document.getElementById('prevBtn').style.display = n===0?'none':'inline-block';
  document.getElementById('nextBtn').textContent = n===slides.length-1?'Fertig ✅':'Weiter →';
  updateProgress();
}

function renderAll(){
  const container = document.getElementById('slidesContainer');
  container.innerHTML = slides.map((s,i)=>renderSlide(s,i)).join('');
  showSlide(0);
  updateProgress();
}

function renderSlide(s,i){
  let body='';
  switch(s.type){
    case 'vocab': body=renderVocab(s,i); break;
    case 'fillblank': body=renderFillBlank(s,i); break;
    case 'match': body=renderMatch(s,i); break;
    case 'reading': body=renderReading(s,i); break;
    case 'writing': body=renderWriting(s,i); break;
  }
  return `<div class="slide" id="slide-${i}">
    <div class="step-indicator">Teil ${i+1} / ${slides.length}</div>
    <div class="card"><h2>${s.title}</h2><p style="color:var(--muted);margin-bottom:16px">${s.subtitle||''}</p>${body}</div>
  </div>`;
}

// VOCAB
function renderVocab(s,i){
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">
    ${s.words.map((w,j)=>`<div class="vocab-card" onclick="revealVocab(${i},${j},this)">${w.de}<div class="zh">${w.zh}</div></div>`).join('')}
  </div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="checkVocab(${i})">Ich habe alle gelernt! ✅</button></div>`;
}

function revealVocab(slideIdx,wordIdx,el){el.classList.add('revealed')}
function checkVocab(i){
  if(slideAnswered[i]) return;
  slideAnswered[i]=true; totalCorrect++; totalAttempts++;
  updateScore(); updateProgress();
  showFeedback(i,'Sehr gut! Alle Vokabeln gelernt. 🎉','correct');
}

// FILL BLANK
function renderFillBlank(s,i){
  let html = s.intro?`<div style="background:var(--light-gold);padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px">${s.intro}</div>`:'';
  html+='<div class="exercise">';
  s.questions.forEach((q,j)=>{
    html+=`<div style="margin-bottom:14px">
      <label style="display:block;margin-bottom:4px;font-weight:500">${j+1}. ${q.prompt}</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="fb-${i}-${j}" placeholder="..." style="flex:1">
        <button class="btn btn-small btn-secondary" onclick="checkFill(${i},${j},'${q.answer.replace(/'/g,"\\'")}')">Prüfen</button>
      </div>
      <span style="font-size:12px;color:var(--muted)">💡 ${q.hint||''}</span>
      <div class="feedback" id="fb-msg-${i}-${j}"></div>
    </div>`;
  });
  html+='</div>';
  return html;
}

function checkFill(i,j,answer){
  if(slideAnswered[i]) return;
  const input = document.getElementById(`fb-${i}-${j}`);
  const msg = document.getElementById(`fb-msg-${i}-${j}`);
  const userAnswer = input.value.trim().toLowerCase();
  totalAttempts++;
  if(userAnswer===answer.toLowerCase()){
    msg.className='feedback correct'; msg.textContent='Richtig! ✅';
    totalCorrect++;
  }else{
    msg.className='feedback wrong'; msg.textContent=`Falsch. Die Antwort ist: "${answer}"`;
  }
  input.disabled=true;
  updateScore();
  checkFillAll(i);
}

function checkFillAll(i){
  const allChecked = slides[i].questions.every((_,j)=>document.getElementById(`fb-${i}-${j}`).disabled);
  if(allChecked && !slideAnswered[i]){
    slideAnswered[i]=true; updateProgress();
    showFeedback(i,'Grammatik-Übung abgeschlossen! 🎉','correct');
  }
}

// MATCH
function renderMatch(s,i){
  const left = s.pairs.map((p,j)=>p.de);
  const right = [...s.pairs].sort(()=>Math.random()-.5).map(p=>p.zh);
  return `
    <div class="match-grid">
      <div class="match-col">${left.map((t,j)=>`<div class="match-item" id="match-left-${i}-${j}" onclick="selectMatch('${i}','left',${j})">${t}</div>`).join('')}</div>
      <div class="match-col">${right.map((t,j)=>`<div class="match-item" id="match-right-${i}-${j}" data-orig="${j}" onclick="selectMatch('${i}','right',${j})">${t}</div>`).join('')}</div>
    </div>
    <div class="feedback" id="match-feedback-${i}"></div>
    <div style="text-align:center;margin-top:12px"><span id="match-score-${i}" style="color:var(--muted);font-size:13px"></span></div>`;
}

function selectMatch(slideIdx,side,idx){
  if(slideAnswered[slideIdx]) return;
  const el = document.getElementById(`match-${side}-${slideIdx}-${idx}`);
  if(el.classList.contains('matched')) return;

  if(!matchSelected){
    matchSelected = {slideIdx,side,idx,el};
    el.classList.add('selected');
  }else if(matchSelected.slideIdx===slideIdx && matchSelected.side!==side){
    const other = matchSelected;
    matchSelected=null;
    other.el.classList.remove('selected');
    // Check if they match
    totalAttempts++;
    const leftText = side==='left'?el.textContent:other.el.textContent;
    const rightText = side==='right'?el.textContent:other.el.textContent;
    const pair = slides[slideIdx].pairs.find(p=>p.de===leftText&&p.zh===rightText);
    if(pair){
      el.classList.add('matched'); other.el.classList.add('matched');
      totalCorrect++;
      updateScore();
      checkMatchAll(slideIdx);
    }else{
      el.classList.add('wrong-choice'); other.el.classList.add('wrong-choice');
      updateScore();
      setTimeout(()=>{el.classList.remove('wrong-choice');other.el.classList.remove('wrong-choice')},600);
    }
  }else{
    matchSelected.el.classList.remove('selected');
    matchSelected={slideIdx,side,idx,el};
    el.classList.add('selected');
  }
}

function checkMatchAll(i){
  const matched = slides[i].pairs.length;
  const done = document.querySelectorAll(`#slide-${i} .match-item.matched`).length/2;
  document.getElementById(`match-score-${i}`).textContent=`${done}/${matched} Paare gefunden`;
  if(done===matched && !slideAnswered[i]){
    slideAnswered[i]=true; updateProgress();
    showFeedback(i,'Alle Paare richtig zugeordnet! 🎉','correct');
  }
}

// READING
function renderReading(s,i){
  let html=`<div style="background:var(--light-gold);padding:16px;border-radius:8px;margin-bottom:20px;font-size:15px;line-height:2">${s.text}</div>`;
  s.questions.forEach((q,j)=>{
    html+=`<div style="margin-bottom:16px"><p style="font-weight:600;margin-bottom:8px">${j+1}. ${q.q}</p>
      <div class="radio-group">${q.options.map((opt,k)=>`
        <label class="radio-item" id="rd-item-${i}-${j}-${k}">
          <input type="radio" name="rd-${i}-${j}" value="${k}" onchange="checkReading(${i},${j},${k},${q.correct})">
          <span>${opt}</span>
        </label>`).join('')}</div>
      <div class="feedback" id="rd-msg-${i}-${j}"></div></div>`;
  });
  return html;
}

function checkReading(i,j,chosen,correct){
  if(slideAnswered[i]) return;
  const msg = document.getElementById(`rd-msg-${i}-${j}`);
  totalAttempts++;
  document.querySelectorAll(`[name="rd-${i}-${j}"]`).forEach(r=>r.disabled=true);
  document.querySelectorAll(`[id^="rd-item-${i}-${j}-"]`).forEach(el=>el.style.pointerEvents='none');
  if(chosen===correct){
    msg.className='feedback correct'; msg.textContent='Richtig! ✅';
    document.getElementById(`rd-item-${i}-${j}-${chosen}`).classList.add('correct-choice');
    totalCorrect++;
  }else{
    msg.className='feedback wrong'; msg.textContent='Falsch.';
    document.getElementById(`rd-item-${i}-${j}-${chosen}`).classList.add('wrong-choice');
    document.getElementById(`rd-item-${i}-${j}-${correct}`).classList.add('correct-choice');
  }
  updateScore();
  checkReadingAll(i);
}

function checkReadingAll(i){
  const allDone = slides[i].questions.every((_,j)=>document.querySelector(`[name="rd-${i}-${j}"]`).disabled);
  if(allDone && !slideAnswered[i]){
    slideAnswered[i]=true; updateProgress();
    showFeedback(i,'Leseverstehen abgeschlossen! 🎉','correct');
  }
}

// WRITING
function renderWriting(s,i){
  return `
    <div style="background:var(--light-gold);padding:14px 18px;border-radius:8px;margin-bottom:16px;font-size:14px">
      <strong>💡 Tipps:</strong>
      <ul style="margin:8px 0 0 18px;color:var(--muted)">${s.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <p style="font-weight:600;margin-bottom:6px">${s.prompt}</p>
    <textarea id="writing-${i}" placeholder="Als ich ein Kind war, ..."></textarea>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
      <button class="speak-btn" id="speak-btn-${i}" onclick="speakText(${i})">🔊 Vorlesen</button>
      <span style="font-size:12px;color:var(--muted)">Schreibe und klicke dann auf Vorlesen</span>
    </div>
    <div style="margin-top:12px"><button class="btn btn-primary" onclick="submitWriting(${i})">Fertig! ✅</button></div>
    <div class="feedback" id="writing-msg-${i}"></div>`;
}

function speakText(i){
  const text = document.getElementById(`writing-${i}`).value.trim();
  if(!text) return;
  const btn = document.getElementById(`speak-btn-${i}`);
  btn.disabled=true; btn.textContent='🔊 Spreche...';
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.85;
  u.onend=()=>{btn.disabled=false;btn.textContent='🔊 Vorlesen'};
  speechSynthesis.speak(u);
}

function submitWriting(i){
  if(slideAnswered[i]) return;
  const text = document.getElementById(`writing-${i}`).value.trim();
  if(!text){
    document.getElementById(`writing-msg-${i}`).className='feedback wrong';
    document.getElementById(`writing-msg-${i}`).textContent='Bitte schreibe etwas!';
    return;
  }
  slideAnswered[i]=true; totalCorrect++; totalAttempts++;
  updateScore(); updateProgress();
  showFeedback(i,'Danke für deine Geschichte! Wunderschön geschrieben. 🎉✨','correct');
}

// HELPERS
function showFeedback(i,msg,type){
  // Find or create a feedback element at slide level
  const el=document.getElementById(`slide-feedback-${i}`);
  if(el){el.className=`feedback ${type}`;el.textContent=msg}
}

// NAVIGATION
document.getElementById('prevBtn').addEventListener('click',()=>{
  if(currentSlide>0) showSlide(currentSlide-1);
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  if(currentSlide<slides.length-1){
    showSlide(currentSlide+1);
  }else{
    // Final screen
    document.getElementById('slidesContainer').innerHTML=`
      <div class="slide active">
        <div class="score-display">
          <div class="big">${totalCorrect}/${totalAttempts}</div>
          <div class="sub">von ${totalAttempts} Aufgaben richtig</div>
          <p style="margin-top:20px;color:var(--brown);font-size:16px">
            ${totalCorrect===totalAttempts?'🌟 Perfekt! Hervorragende Arbeit!':
              totalCorrect/totalAttempts>0.7?'👏 Gut gemacht! Weiter so!':
              '📚 Gut versucht! Übe weiter und du wirst besser!'}
          </p>
          <p style="color:var(--muted);margin-top:12px;font-size:14px">
            Deutsch ist nicht nur Grammatik —<br>Deutsch ist <strong>deine Geschichte</strong>. 🦞
          </p>
        </div>
      </div>`;
    document.getElementById('prevBtn').style.display='none';
    document.getElementById('nextBtn').style.display='none';
  }
});

// INIT
renderAll();
</script>
</body>
</html>
